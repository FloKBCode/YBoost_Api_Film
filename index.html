<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pellicule</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --red: #E50914;
      --bg: #0d0d0d;
      --surface: #141414;
      --surface2: #1f1f1f;
      --text: #ffffff;
      --muted: #a0a0a0;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; min-height: 100vh; overflow-x: hidden; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 18px 48px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.95), transparent);
    }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; color: var(--red); letter-spacing: 3px; }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .search-bar {
      display: flex; align-items: center;
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 4px; padding: 8px 14px; gap: 8px;
    }
    .search-bar input { background: none; border: none; outline: none; color: white; font-family: 'Outfit', sans-serif; font-size: 0.9rem; width: 200px; }
    .search-bar input::placeholder { color: var(--muted); }
    .count-badge { background: var(--red); color: white; font-size: 0.75rem; font-weight: 700; padding: 4px 10px; border-radius: 3px; letter-spacing: 1px; }

    /* HERO */
    .hero {
      height: 75vh; position: relative;
      display: flex; align-items: flex-end; padding: 0 48px 60px; overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0;
      background: linear-gradient(to right, rgba(0,0,0,0.9) 40%, rgba(0,0,0,0.3)),
                  linear-gradient(to top, rgba(0,0,0,0.95) 10%, transparent 50%);
    }
    .hero-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
    .hero-content { position: relative; z-index: 2; max-width: 580px; }
    .hero-tag { display: inline-block; background: var(--red); color: white; font-size: 0.7rem; font-weight: 700; letter-spacing: 2px; padding: 4px 10px; border-radius: 2px; margin-bottom: 16px; text-transform: uppercase; }
    .hero-title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3.5rem, 7vw, 6rem); line-height: 0.95; margin-bottom: 16px; }
    .hero-title em { color: var(--red); font-style: normal; }
    .hero-desc { color: #ccc; font-size: 1rem; line-height: 1.6; margin-bottom: 28px; font-weight: 300; }
    .hero-btns { display: flex; gap: 12px; }
    .btn-play { display: flex; align-items: center; gap: 8px; background: white; color: black; font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 0.95rem; padding: 12px 28px; border: none; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
    .btn-play:hover { background: rgba(255,255,255,0.8); }
    .btn-info { display: flex; align-items: center; gap: 8px; background: rgba(109,109,110,0.7); color: white; font-family: 'Outfit', sans-serif; font-weight: 600; font-size: 0.95rem; padding: 12px 28px; border: none; border-radius: 4px; cursor: pointer; transition: background 0.2s; }
    .btn-info:hover { background: rgba(109,109,110,0.5); }

    /* FILTERS */
    .filters { padding: 32px 48px 0; display: flex; gap: 10px; flex-wrap: wrap; }
    .filter-btn { background: var(--surface2); color: var(--muted); border: 1px solid rgba(255,255,255,0.08); border-radius: 3px; padding: 7px 16px; font-family: 'Outfit', sans-serif; font-size: 0.82rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .filter-btn:hover, .filter-btn.active { background: var(--red); color: white; border-color: var(--red); }

    /* SECTION */
    .section { padding: 36px 48px 60px; }
    .section-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 1.5px; margin-bottom: 24px; display: flex; align-items: center; gap: 12px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.08); }

    /* GRID */
    .films-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 8px; }

    /* CARD */
    .film-card {
      position: relative; border-radius: 4px; overflow: hidden;
      cursor: pointer; aspect-ratio: 2/3; background: var(--surface2);
      transition: transform 0.3s ease;
      animation: fadeUp 0.4s ease both;
    }
    .film-card:hover { transform: scale(1.05); z-index: 10; }
    @keyframes fadeUp { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: translateY(0); } }

    .card-poster { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-fallback {
      width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; text-align: center; padding: 16px;
    }
    .card-body {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 40px 12px 12px;
      background: linear-gradient(to top, rgba(0,0,0,0.97) 70%, transparent);
      opacity: 0; transition: opacity 0.25s;
    }
    .film-card:hover .card-body { opacity: 1; }
    .card-title { font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 0.5px; margin-bottom: 4px; }
    .card-director { font-size: 0.7rem; color: var(--muted); font-weight: 300; margin-bottom: 6px; }
    .card-meta { display: flex; gap: 6px; align-items: center; }
    .card-year { font-size: 0.7rem; color: #6cdf6c; font-weight: 600; }
    .card-genre-tag { font-size: 0.62rem; color: var(--muted); border: 1px solid rgba(255,255,255,0.15); padding: 1px 6px; border-radius: 2px; }
    .card-overlay { position: absolute; inset: 0; background: rgba(229,9,20,0.1); opacity: 0; transition: opacity 0.25s; display: flex; align-items: center; justify-content: center; }
    .film-card:hover .card-overlay { opacity: 1; }
    .play-icon { width: 46px; height: 46px; background: rgba(255,255,255,0.92); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: black; font-size: 1.1rem; }

    /* LOADER */
    .loader { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 300px; gap: 16px; }
    .spinner { width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--red); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 80px 20px; color: var(--muted); }

    /* MODAL */
    .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: #181818; border-radius: 8px; width: min(500px, 90vw); overflow: hidden; transform: scale(0.92); transition: transform 0.3s; }
    .modal-overlay.open .modal { transform: scale(1); }
    .modal-header { height: 260px; position: relative; overflow: hidden; }
    .modal-poster { width: 100%; height: 100%; object-fit: cover; display: block; }
    .modal-header-overlay { position: absolute; inset: 0; background: linear-gradient(to top, #181818 5%, transparent 60%); }
    .modal-close { position: absolute; top: 14px; right: 14px; width: 32px; height: 32px; background: rgba(0,0,0,0.7); border: none; border-radius: 50%; color: white; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 2; }
    .modal-title-overlay { position: absolute; bottom: 14px; left: 20px; right: 20px; z-index: 2; font-family: 'Bebas Neue', sans-serif; font-size: 2rem; text-shadow: 1px 2px 10px rgba(0,0,0,0.9); }
    .modal-body { padding: 20px 24px 28px; }
    .modal-info { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .modal-tag { padding: 4px 12px; border-radius: 3px; font-size: 0.8rem; font-weight: 600; }
    .modal-tag.year { background: rgba(108,223,108,0.15); color: #6cdf6c; }
    .modal-tag.genre { background: rgba(229,9,20,0.15); color: #ff6b6b; }
    .modal-director { color: var(--muted); font-size: 0.9rem; line-height: 1.6; }
    .modal-director strong { color: white; }

    /* SCROLL TOP */
    .scroll-top { position: fixed; bottom: 30px; right: 30px; z-index: 50; width: 42px; height: 42px; background: var(--red); border: none; border-radius: 4px; color: white; font-size: 1rem; cursor: pointer; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .scroll-top.visible { opacity: 1; pointer-events: all; }
  </style>
</head>
<body>

<nav>
  <div class="logo">Pellicule</div>
  <div class="nav-right">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Titre, réalisateur..."/>
    </div>
    <div class="count-badge" id="countBadge">...</div>
  </div>
</nav>

<div class="hero">
  <img class="hero-img" id="heroPoster" src="" alt=""/>
  <div class="hero-bg"></div>
  <div class="hero-content">
    <div class="hero-tag">🎬 Cinémathèque</div>
    <div class="hero-title">Votre<br><em>Pellicule</em><br>Personnelle</div>
    <div class="hero-desc">Explorez notre sélection de films cultes. Filtrez par genre, recherchez vos favoris.</div>
    <div class="hero-btns">
      <button class="btn-play" onclick="document.querySelector('.section').scrollIntoView({behavior:'smooth'})">▶ Voir la collection</button>
      <button class="btn-info" onclick="document.getElementById('searchInput').focus()">Rechercher</button>
    </div>
  </div>
</div>

<div class="filters" id="genreFilters"></div>

<div class="section">
  <div class="section-title">Catalogue</div>
  <div id="filmsGrid" class="films-grid">
    <div class="loader"><div class="spinner"></div></div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <img class="modal-poster" id="modalPoster" src="" alt=""/>
      <div class="modal-header-overlay"></div>
      <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('open')">✕</button>
      <div class="modal-title-overlay" id="modalTitle"></div>
    </div>
    <div class="modal-body">
      <div class="modal-info" id="modalInfo"></div>
      <div class="modal-director" id="modalDirector"></div>
    </div>
  </div>
</div>

<button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
  let allFilms = [];
  let activeGenre = 'Tous';

  function buildCard(film, i) {
    return `
      <div class="film-card" style="animation-delay:${i*0.04}s" onclick="openModal(${film.id})">
        ${film.poster
          ? `<img class="card-poster" src="${film.poster}" alt="${film.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          : ''}
        <div class="card-fallback" style="${film.poster ? 'display:none' : ''}">${film.title}</div>
        <div class="card-overlay"><div class="play-icon">▶</div></div>
        <div class="card-body">
          <div class="card-title">${film.title}</div>
          <div class="card-director">${film.director}</div>
          <div class="card-meta">
            <span class="card-year">${film.year}</span>
            <span class="card-genre-tag">${film.genre}</span>
          </div>
        </div>
      </div>`;
  }

  function renderFilms(films) {
    const grid = document.getElementById('filmsGrid');
    if (!films.length) { grid.innerHTML = `<div class="empty">🎬 Aucun film trouvé</div>`; return; }
    grid.innerHTML = films.map((f,i) => buildCard(f,i)).join('');
  }

  function buildFilters(films) {
    const genres = ['Tous', ...new Set(films.map(f => f.genre))];
    const c = document.getElementById('genreFilters');
    c.innerHTML = genres.map(g => `<button class="filter-btn${g==='Tous'?' active':''}" data-genre="${g}">${g}</button>`).join('');
    c.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => {
      c.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeGenre = btn.dataset.genre;
      applyFilters();
    }));
  }

  function applyFilters() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    let filtered = allFilms;
    if (activeGenre !== 'Tous') filtered = filtered.filter(f => f.genre === activeGenre);
    if (q) filtered = filtered.filter(f => f.title.toLowerCase().includes(q) || f.director.toLowerCase().includes(q));
    renderFilms(filtered);
    document.getElementById('countBadge').textContent = `${filtered.length} film${filtered.length>1?'s':''}`;
  }

  function openModal(id) {
    const film = allFilms.find(f => f.id === id);
    if (!film) return;
    document.getElementById('modalTitle').textContent = film.title;
    document.getElementById('modalPoster').src = film.poster || '';
    document.getElementById('modalInfo').innerHTML = `<span class="modal-tag year">📅 ${film.year}</span><span class="modal-tag genre">🎭 ${film.genre}</span>`;
    document.getElementById('modalDirector').innerHTML = `<strong>Réalisateur :</strong> ${film.director}`;
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modalOverlay')) document.getElementById('modalOverlay').classList.remove('open');
  }

  document.getElementById('searchInput').addEventListener('input', applyFilters);
  window.addEventListener('scroll', () => document.getElementById('scrollTop').classList.toggle('visible', scrollY > 300));

  fetch('/api/films').then(r => r.json()).then(res => {
    allFilms = res.data;
    if (allFilms[0]?.poster) document.getElementById('heroPoster').src = allFilms[2].poster;
    document.getElementById('countBadge').textContent = `${allFilms.length} films`;
    buildFilters(allFilms);
    renderFilms(allFilms);
  }).catch(() => {
    document.getElementById('filmsGrid').innerHTML = `<div class="empty">⚠️ Erreur de chargement</div>`;
  });
</script>
</body>
</html>
